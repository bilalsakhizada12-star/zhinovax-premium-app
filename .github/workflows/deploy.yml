name: Auto Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main # This triggers the deploy every time you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 📂 Sync files to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The folder to upload if it's not root. Often Hostinger requires you to deploy into a subfolder depending on FTP user.
          # server-dir: /public_html/
