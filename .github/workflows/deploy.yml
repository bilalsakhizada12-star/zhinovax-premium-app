name: Auto Deploy to Hostinger via SCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        
      - name: 🕵️ Detect Active App Path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          script: |
            echo "--- Searching for all App.jsx files ---"
            find . -name "App.jsx" -exec ls -l {} +
            echo "--- Checking content of public_html/app/src/App.jsx ---"
            cat public_html/app/src/App.jsx | head -n 20


