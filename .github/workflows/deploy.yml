name: Auto Deploy to Hostinger via SCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        
      - name: 🗑️ Remove .git folder (Security & Fix Permission Error)
        run: rm -rf .git

      - name: "🚀 Step 1: Deploy Directly to Live Hostinger Server"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          source: "."
          target: "domains/zhinovax.com/public_html/app"
          overwrite: true
          rm: false
