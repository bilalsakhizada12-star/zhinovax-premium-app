name: Auto Deploy to Hostinger via SCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        
      - name: "🚀 Step 1: Sync to Staging"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          source: "."
          target: "public_html/app"
          overwrite: true
          rm: false

      - name: "🔗 Step 2: Trigger Bridge to Live"
        run: |
          sleep 10
          curl -L "https://app.zhinovax.com/deploy.php?key=zhinovax_secret_99"
