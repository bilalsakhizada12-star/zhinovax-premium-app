name: Auto Deploy to Hostinger via SCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3
        
      - name: 🔍 Probe Directory Structure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          script: |
            echo "--- Root listing ---"
            ls -F
            echo "--- domains/ listing ---"
            ls -F domains/ || echo "No domains folder"
            echo "--- public_html/ listing ---"
            ls -F public_html/ || echo "No public_html folder"
            echo "--- Finding app.zhinovax.com ---"
            find . -maxdepth 4 -name "app" -type d
            find . -maxdepth 4 -name "app.zhinovax.com" -type d

