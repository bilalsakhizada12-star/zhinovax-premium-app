<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Zhinovax Premium VIP (Build 1.3)</title>
    
    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --gold-primary: #d4af37;
            --brand-teal: #008e9b;
            --bg-dark: #051014;
            --surface-glass: rgba(255,255,255,0.03);
            --text-main: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --border-glass: rgba(255,255,255,0.08);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #f9d976 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Vazirmatn', sans-serif; }
        body, html { margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; direction: rtl; }
        #root { width: 100%; max-width: 420px; min-height: 100vh; background-color: var(--bg-dark); margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        .glass { background: var(--surface-glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--border-glass); }
        .screen { flex: 1; overflow-y: auto; width: 100%; }
        .scroller { display: flex; overflow-x: auto; gap: 15px; padding: 10px 20px; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        .hover-lift { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hover-lift:active { transform: scale(0.96); }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONSTANTS & MOCK DATA ---
        const SUPABASE_URL = 'https://cjxyfwuqakbmcgpjsub.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DxFGUXuiKq_qmyEmvvKA5g_iQhQ-6m9N';
        const HYBRID_CARS = [
            { 
                id: "hybrid-bugatti", 
                title: 'بـوگـاتـی (Zhinovax Edition)', 
                price: '4,500,000$', 
                image_url: 'https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=800&auto=format&fit=crop', 
                color: 'سفید و آبی کورسی', plate: '۲۰۲۴#', fuel: 'پترول', engine: 'W16 Quad-Turbo', transmission: 'اوتومات', 
                accident_history: 'بدون رنگ و خط', features: ['فول آپشن', 'کیربن فایبر', 'کمره ۳۶۰', 'سیستم صوتی حرفه‌ای'],
                documents: 'پاک / کارت هوشمند', views: 12540, mileage: 'Km ۵۰۰', location: 'کابل / دبی', type: 'car'
            },
            { 
                id: "hybrid-supra", 
                title: 'تویوتا سوپرا ۲۰۲۴', 
                price: '155,000$', 
                image_url: 'https://images.unsplash.com/photo-1626847037657-fd3622613ce3?q=80&w=800&auto=format&fit=crop', 
                color: 'سیاه متالیک', plate: 'کابل - ۲۰۲۴', fuel: 'پترول توربو', engine: '۳.۰ لیتر', transmission: 'اوتومات', 
                accident_history: 'جدید (صفر)', features: ['درایو ماید', 'کمره عقب', 'سنسور', 'تکمه درایو'],
                documents: 'پاک', views: 8940, mileage: 'Km ۰', location: 'کابل، افغانستان', type: 'car'
            }
        ];
        const MOCK_PROPS = [
            { id: 101, title: 'کتوازی تاور', price: '220,000$', image_url: 'https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?q=80&w=800&auto=format&fit=crop', area: '۲۰۰ مترمربع', rooms: 3, location: 'کابل', type: 'property' },
            { id: 102, title: 'سلطانی تاور', price: '95,000$', image_url: 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=800&auto=format&fit=crop', area: '۹۰ مترمربع', rooms: 2, location: 'کابل', type: 'property' }
        ];

        // --- SUPABASE HOOK ---
        const useSupabase = () => {
            const [cars, setCars] = React.useState([]);
            const [properties, setProperties] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [client, setClient] = React.useState(null);

            React.useEffect(() => {
                const sc = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                setClient(sc);
                fetchData(sc);
            }, []);

            const fetchData = async (sc) => {
                try {
                    setLoading(true);
                    const { data: cData } = await sc.from('cars').select('*');
                    const { data: pData } = await sc.from('properties').select('*');
                    
                    const allCars = [...HYBRID_CARS];
                    if (cData) {
                        cData.forEach(dbCar => {
                            if (!allCars.find(c => c.title === dbCar.title)) allCars.push(dbCar);
                        });
                    }
                    setCars(allCars);
                    setProperties(pData || MOCK_PROPS);
                } catch (e) {
                    setCars(HYBRID_CARS);
                    setProperties(MOCK_PROPS);
                } finally {
                    setLoading(false);
                }
            };

            const addCar = async (car) => {
                const { data, error } = await client.from('cars').insert([car]).select();
                if (!error) fetchData(client);
                return { success: !error, error };
            };

            return { cars, properties, loading, addCar };
        };

        // --- COMPONENTS ---
        const AssetCard = ({ data, type, onClick }) => (
            <div onClick={() => onClick(type, data.id)} className="glass hover-lift" style={{ width: '185px', borderRadius: '24px', padding: '10px', marginRight: '15px', cursor: 'pointer', flexShrink: 0, position: 'relative' }}>
                <div style={{ position: 'absolute', top: '18px', right: '18px', background: '#0084ad', color: '#fff', padding: '4px 12px', borderRadius: '14px', fontSize: '11px', fontWeight: '900', zIndex: 10 }}>{data.price}</div>
                <div style={{ width: '100%', height: '140px', borderRadius: '18px', backgroundImage: `url(${data.image_url})`, backgroundSize: 'cover', backgroundPosition: 'center', marginBottom: '12px' }}></div>
                <div style={{ padding: '0 4px', textAlign: 'right' }}>
                    <div style={{ fontSize: '10px', color: 'rgba(255,255,255,0.5)', fontWeight: 'bold' }}>رجستر: {data.reg_no || '---'}</div>
                    <h4 style={{ margin: '2px 0 12px', fontSize: '13px', fontWeight: '900', color: '#fff' }}>{data.title}</h4>
                </div>
            </div>
        );

        const Navbar = ({ activeTab, onTabChange }) => (
            <div style={{ position: 'fixed', bottom: '20px', left: '50%', transform: 'translateX(-50%)', width: '90%', maxWidth: '380px', height: '70px', zIndex: '1000' }}>
                <div className="glass" style={{ position: 'absolute', bottom: '0', width: '100%', height: '100%', borderRadius: '25px', boxShadow: '0 10px 40px rgba(0,0,0,0.5)' }}></div>
                <div style={{ position: 'relative', width: '100%', height: '100%', display: 'flex', justifyContent: 'space-around', alignItems: 'center' }}>
                    <div onClick={() => onTabChange('dashboard')} style={{ color: activeTab === 'dashboard' ? 'var(--gold-primary)' : 'var(--text-muted)', cursor: 'pointer', textAlign: 'center' }}><i className="fa-solid fa-chart-line"></i><div style={{fontSize: '9px'}}>داشبورد</div></div>
                    <div onClick={() => onTabChange('home')} style={{ color: activeTab === 'home' ? 'var(--gold-primary)' : 'var(--text-muted)', cursor: 'pointer', textAlign: 'center' }}><i className="fa-solid fa-house"></i><div style={{fontSize: '9px'}}>خانه</div></div>
                    <div onClick={() => onTabChange('settings')} style={{ color: activeTab === 'settings' ? 'var(--gold-primary)' : 'var(--text-muted)', cursor: 'pointer', textAlign: 'center' }}><i className="fa-solid fa-gear"></i><div style={{fontSize: '9px'}}>تنظیمات</div></div>
                </div>
            </div>
        );

        const Home = ({ cars, properties, loading, onOpenDetail }) => (
            <div className="screen" style={{ paddingBottom: '110px' }}>
                <div style={{ padding: '20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div style={{ display: 'flex', flexDirection: 'column' }}>
                        <img src="https://www.directfiles.link/YGDVHGGRG" style={{ height: '32px' }} alt="Zhinovax" />
                        <span style={{ fontSize: '8px', color: 'var(--gold-primary)', opacity: 0.5 }}>Build 1.3 - Final vVIP</span>
                    </div>
                </div>
                <div style={{ padding: '0 20px', marginBottom: '30px' }}>
                    <div className="glass" style={{ padding: '25px', borderRadius: '24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <div style={{ textAlign: 'right' }}><h2 style={{ fontSize: '18px', fontWeight: 'bold', margin: '0 0 5px' }}>دارایی خاص خود را پیدا کنید</h2><p style={{ fontSize: '12px', color: 'var(--text-muted)' }}>مجموعه ممتاز خودرو و املاک</p></div>
                        <div style={{ width: '45px', height: '45px', background: 'var(--gold-primary)', borderRadius: '15px', display: 'flex', justifyContent: 'center', alignItems: 'center' }}><i className="fa-solid fa-gem" style={{color: '#000'}}></i></div>
                    </div>
                </div>
                <div style={{ padding: '0 20px' }}>
                    <h3 style={{ fontSize: '18px', fontWeight: 'bold', marginBottom: '20px', textAlign: 'right' }}>خودروهای پیشنهاد شده</h3>
                    <div className="scroller" style={{ margin: '0 -20px' }}>
                        {cars.map(car => <AssetCard key={car.id} data={car} type="car" onClick={onOpenDetail} />)}
                    </div>
                    <h3 style={{ fontSize: '18px', fontWeight: 'bold', margin: '40px 0 20px', textAlign: 'right' }}>املاک پیشنهاد شده</h3>
                    <div className="scroller" style={{ margin: '0 -20px' }}>
                        {properties.map(p => <AssetCard key={p.id} data={p} type="property" onClick={onOpenDetail} />)}
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const { cars, properties, loading, addCar } = useSupabase();
            const [activeTab, setActiveTab] = React.useState('home');

            return (
                <div className="app-container">
                    {activeTab === 'home' && <Home cars={cars} properties={properties} loading={loading} onOpenDetail={() => {}} />}
                    {activeTab === 'settings' && <div className="screen" style={{padding: '40px', textAlign: 'right'}}><h2>تنظیمات</h2><button onClick={() => alert('Coming Soon!')} style={{background: 'var(--gold-primary)', padding: '10px 20px', borderRadius: '10px', border: 'none', fontWeight: 'bold'}}>افزودن خودرو</button></div>}
                    <Navbar activeTab={activeTab} onTabChange={setActiveTab} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
